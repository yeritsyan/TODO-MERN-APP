services:
  - type: web
    name: TODO-MERN-APP-Frontend
    runtime: static
    repo: https://github.com/yeritsyan/TODO-MERN-APP
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: CHANGE_ME
        sync: false
  - type: web
    name: TODO-MERN-APP-Backend
    runtime: node
    repo: https://github.com/yeritsyan/TODO-MERN-APP
    plan: free
    region: frankfurt
    buildCommand: npm run setup
    startCommand: npm run start
    rootDir: backend
    envVars:
      - key: DB_URL
        value: CHANGE_ME
        sync: false
      - key: JWT_SECRET
        value: CHANGE_ME
        sync: false
      - key: FRONTEND_URL
        value: CHANGE_ME
        sync: false
version: "1"
